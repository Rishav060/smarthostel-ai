<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SmartHostel AI — Operations & Safety Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#10151f;
    --slate:#1c2436;
    --slate-soft:#2a3450;
    --paper:#f5f6fa;
    --line:#e1e4ee;
    --teal:#1fb6a6;
    --teal-deep:#0e8c7e;
    --amber:#f0a23b;
    --rose:#e2566b;
    --indigo:#5b6cf0;
    --muted:#6b7488;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Sora', sans-serif;
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'JetBrains Mono', monospace;}
  /* ---------- Login ---------- */
  .login-wrap{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background: radial-gradient(circle at 20% 20%, #1c2436 0%, #10151f 60%);
    padding:24px;
  }
  .login-card{
    width:100%; max-width:920px; background:#ffffff; border-radius:20px;
    display:grid; grid-template-columns:1.1fr 1fr; overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,0.35);
  }
  @media (max-width:760px){ .login-card{grid-template-columns:1fr;} .login-visual{display:none;} }
  .login-visual{
    background:linear-gradient(160deg,#1c2436 0%, #0e8c7e 130%);
    padding:48px; color:#fff; display:flex; flex-direction:column; justify-content:space-between;
    position:relative; overflow:hidden;
  }
  .login-visual::after{
    content:""; position:absolute; right:-60px; bottom:-60px; width:240px; height:240px;
    border:1px solid rgba(255,255,255,0.15); border-radius:50%;
  }
  .login-visual::before{
    content:""; position:absolute; right:20px; bottom:20px; width:150px; height:150px;
    border:1px solid rgba(255,255,255,0.12); border-radius:50%;
  }
  .brand-mark{
    width:46px; height:46px; border-radius:12px; background:var(--amber);
    display:flex; align-items:center; justify-content:center; font-weight:800; font-size:20px; color:#1c2436;
  }
  .login-form{padding:48px;}
  .role-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:22px;}
  .role-btn{
    border:1px solid var(--line); background:#fff; border-radius:12px; padding:14px;
    text-align:left; cursor:pointer; transition:all .15s ease; font-family:inherit;
  }
  .role-btn:hover{border-color:var(--teal); background:#f0fbf9; transform:translateY(-1px);}
  .role-btn .r-title{font-weight:700; font-size:14px;}
  .role-btn .r-sub{font-size:11.5px; color:var(--muted); margin-top:2px;}

  /* ---------- App shell ---------- */
  .shell{display:flex; min-height:100vh;}
  .sidebar{
    width:230px; background:var(--ink); color:#fff; flex-shrink:0;
    display:flex; flex-direction:column; padding:22px 16px; gap:4px;
  }
  .sidebar .brand{display:flex; align-items:center; gap:10px; padding:0 8px 22px;}
  .sidebar .brand-mark{width:34px; height:34px; font-size:15px; border-radius:9px;}
  .sidebar .brand-name{font-weight:800; font-size:15px; letter-spacing:.2px;}
  .sidebar .brand-sub{font-size:10px; color:#8893ab; letter-spacing:1.5px; text-transform:uppercase;}
  .nav-item{
    display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px;
    color:#aab2c8; font-size:13.5px; font-weight:500; cursor:pointer; transition:.15s;
  }
  .nav-item:hover{background:#1c2436; color:#fff;}
  .nav-item.active{background:var(--teal); color:#0b1018; font-weight:700;}
  .nav-icon{width:18px; text-align:center; font-size:14px;}
  .sidebar-footer{margin-top:auto; padding:12px 8px; border-top:1px solid #2a3450;}
  .user-pill{display:flex; align-items:center; gap:10px; font-size:12.5px; color:#cfd4e4;}
  .avatar{width:32px; height:32px; border-radius:50%; background:var(--indigo); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px;}
  .logout{font-size:11px; color:#8893ab; cursor:pointer; margin-top:8px; display:inline-block;}
  .logout:hover{color:#fff;}

  .main{flex:1; padding:28px 36px; max-width:1280px;}
  .topbar{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:24px; gap:16px; flex-wrap:wrap;}
  .topbar h1{font-size:24px; font-weight:800;}
  .topbar .eyebrow{font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); font-weight:700; margin-bottom:4px;}
  .sos-button{
    background:var(--rose); color:#fff; border:none; padding:12px 22px; border-radius:12px;
    font-weight:800; font-size:14px; cursor:pointer; box-shadow:0 8px 20px rgba(226,86,107,0.35);
    display:flex; align-items:center; gap:8px; font-family:inherit;
  }
  .sos-button:hover{background:#cc4658;}
  .sos-button .pulse{width:9px; height:9px; border-radius:50%; background:#fff; animation:pulse 1.4s infinite;}
  @keyframes pulse{0%{opacity:1; transform:scale(1);} 50%{opacity:.4; transform:scale(1.4);} 100%{opacity:1; transform:scale(1);}}

  /* ---------- Cards / grids ---------- */
  .grid{display:grid; gap:18px;}
  .grid-4{grid-template-columns:repeat(4,1fr);}
  .grid-3{grid-template-columns:repeat(3,1fr);}
  .grid-2{grid-template-columns:1.4fr 1fr;}
  @media(max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr);} .grid-3{grid-template-columns:1fr 1fr;} .grid-2{grid-template-columns:1fr;}}
  @media(max-width:640px){.grid-4{grid-template-columns:1fr;} .grid-3{grid-template-columns:1fr;}}

  .card{background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px;}
  .card h3{font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:14px;}
  .stat{font-size:30px; font-weight:800; line-height:1;}
  .stat-label{font-size:12.5px; color:var(--muted); margin-top:6px;}
  .stat-trend{font-size:11.5px; margin-top:8px; font-weight:700;}
  .trend-up{color:var(--teal-deep);}
  .trend-down{color:var(--rose);}

  /* ---------- Heat map ---------- */
  .heatmap-grid{display:grid; grid-template-columns:repeat(10, 1fr); gap:6px;}
  .heat-cell{
    aspect-ratio:1; border-radius:6px; display:flex; align-items:center; justify-content:center;
    font-size:10px; font-weight:700; color:#fff; cursor:pointer; position:relative; mono;
    font-family:'JetBrains Mono', monospace;
    transition:transform .1s;
  }
  .heat-cell:hover{transform:scale(1.12); z-index:2;}
  .heat-green{background:#1fb6a6;}
  .heat-yellow{background:#f0a23b;}
  .heat-red{background:#e2566b;}
  .legend{display:flex; gap:18px; margin-top:14px; font-size:12px; color:var(--muted);}
  .legend span{display:inline-flex; align-items:center; gap:6px;}
  .dot{width:10px; height:10px; border-radius:3px; display:inline-block;}

  /* ---------- Lists / tables ---------- */
  .list-row{
    display:flex; align-items:center; justify-content:space-between; padding:13px 0;
    border-bottom:1px solid var(--line); gap:12px;
  }
  .list-row:last-child{border-bottom:none;}
  .pill{font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px; white-space:nowrap;}
  .pill-high{background:#fde8eb; color:var(--rose);}
  .pill-medium{background:#fef3e2; color:#b9772a;}
  .pill-low{background:#e6f7f4; color:var(--teal-deep);}
  .pill-open{background:#eef0fb; color:var(--indigo);}
  .pill-progress{background:#fef3e2; color:#b9772a;}
  .pill-resolved{background:#e6f7f4; color:var(--teal-deep);}
  .pill-ack{background:#eef0fb; color:var(--indigo);}

  .tag{font-size:10.5px; font-weight:700; padding:3px 9px; border-radius:8px; background:#f1f2f7; color:#555f78; text-transform:uppercase; letter-spacing:.5px;}

  /* ---------- Forms ---------- */
  textarea, input, select{
    width:100%; border:1px solid var(--line); border-radius:10px; padding:11px 13px;
    font-family:inherit; font-size:13.5px; background:#fafbfd; resize:vertical;
  }
  textarea:focus, input:focus, select:focus{outline:2px solid var(--teal); outline-offset:1px; border-color:transparent;}
  label{font-size:12px; font-weight:700; color:var(--muted); display:block; margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px;}
  .field{margin-bottom:14px;}
  .btn{
    border:none; border-radius:10px; padding:11px 20px; font-weight:700; font-size:13.5px;
    cursor:pointer; font-family:inherit; transition:.15s;
  }
  .btn-primary{background:var(--ink); color:#fff;}
  .btn-primary:hover{background:#000;}
  .btn-ghost{background:#fff; border:1px solid var(--line); color:var(--ink);}
  .btn-ghost:hover{background:#f5f6fa;}
  .btn-teal{background:var(--teal); color:#0b1018;}
  .btn-teal:hover{background:var(--teal-deep); color:#fff;}
  .btn:disabled{opacity:.5; cursor:not-allowed;}

  /* ---------- AI badge ---------- */
  .ai-result{
    border:1px dashed #cfd6ea; border-radius:12px; padding:14px; margin-top:14px;
    background:linear-gradient(135deg, #f6f8ff 0%, #f0fbf9 100%);
  }
  .ai-result .ai-head{display:flex; align-items:center; gap:8px; font-size:12px; font-weight:800; color:var(--indigo); margin-bottom:8px;}
  .ai-dot{width:7px; height:7px; border-radius:50%; background:var(--indigo); animation:pulse 1.5s infinite;}
  .ai-row{display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;}

  /* ---------- Chat ---------- */
  .chat-window{height:380px; overflow-y:auto; border:1px solid var(--line); border-radius:12px; padding:16px; background:#fafbfd; display:flex; flex-direction:column; gap:12px;}
  .msg{max-width:75%; padding:10px 14px; border-radius:14px; font-size:13.5px; line-height:1.5;}
  .msg-bot{background:#fff; border:1px solid var(--line); align-self:flex-start; border-bottom-left-radius:4px;}
  .msg-user{background:var(--ink); color:#fff; align-self:flex-end; border-bottom-right-radius:4px;}
  .chat-input-row{display:flex; gap:10px; margin-top:12px;}
  .suggestion{font-size:11.5px; padding:6px 12px; border:1px solid var(--line); border-radius:20px; background:#fff; cursor:pointer; color:var(--muted);}
  .suggestion:hover{border-color:var(--teal); color:var(--teal-deep);}

  /* ---------- Modal ---------- */
  .modal-bg{position:fixed; inset:0; background:rgba(16,21,31,0.55); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;}
  .modal{background:#fff; border-radius:18px; padding:28px; max-width:440px; width:100%; text-align:center;}
  .modal .icon-ring{width:64px; height:64px; border-radius:50%; background:#fde8eb; color:var(--rose); display:flex; align-items:center; justify-content:center; font-size:28px; margin:0 auto 16px;}

  /* ---------- Toast ---------- */
  .toast-wrap{position:fixed; top:20px; right:20px; display:flex; flex-direction:column; gap:10px; z-index:60;}
  .toast{background:var(--ink); color:#fff; padding:12px 18px; border-radius:10px; font-size:13px; box-shadow:0 10px 30px rgba(0,0,0,0.25); display:flex; align-items:center; gap:10px; min-width:220px; animation:slidein .25s ease;}
  @keyframes slidein{from{transform:translateX(20px); opacity:0;} to{transform:translateX(0); opacity:1;}}
  .toast .ttag{width:8px; height:8px; border-radius:50%; background:var(--rose); flex-shrink:0;}

  .scroll-x{overflow-x:auto;}
  .bar-row{display:flex; align-items:center; gap:12px; margin-bottom:10px;}
  .bar-track{flex:1; height:8px; background:#eef0f5; border-radius:6px; overflow:hidden;}
  .bar-fill{height:100%; border-radius:6px;}
  .bar-label{font-size:12px; width:90px; color:var(--muted); font-weight:600;}
  .bar-val{font-size:12px; font-weight:700; width:40px; text-align:right; mono; font-family:'JetBrains Mono',monospace;}

  .qr-box{
    width:160px; height:160px; margin:0 auto; background:#fff; border:1px solid var(--line); border-radius:12px;
    display:flex; align-items:center; justify-content:center; padding:10px;
  }
  .empty{text-align:center; padding:40px 20px; color:var(--muted); font-size:13px;}
  .empty .e-icon{font-size:30px; margin-bottom:10px;}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ============================ MOCK DATA ============================ */

const ROOMS = Array.from({length:40}, (_,i)=>{
  const floor = Math.floor(i/10)+1;
  const num = (i%10)+1;
  return { id: `${floor}0${num}`, floor, capacity:3 };
});

// seeded issue density per room (0-5+) -> drives heatmap
const seedIssues = {};
ROOMS.forEach((r,i)=>{
  // deterministic pseudo-random based on index
  const v = (i*7 % 11);
  seedIssues[r.id] = v > 7 ? Math.min(5, v-5) : (v > 4 ? 1 : 0);
});

const INITIAL_COMPLAINTS = [
  { id:"C-1042", room:"203", student:"Aarav Mehta", title:"Water leakage near washbasin", category:"Plumbing", urgency:"Medium", status:"In Progress", dept:"Maintenance", time:"2h ago" },
  { id:"C-1041", room:"305", student:"Priya Nair", title:"Roommate plays loud music after midnight", category:"Roommate Conflict", urgency:"Medium", status:"Open", dept:"Warden", time:"4h ago" },
  { id:"C-1039", room:"112", student:"Rohan Das", title:"Fan not working, room very hot", category:"Electrical", urgency:"Low", status:"Resolved", dept:"Maintenance", time:"1d ago" },
  { id:"C-1037", room:"401", student:"Sneha Iyer", title:"Smell of smoke and shouting from next room", category:"Safety / Disturbance", urgency:"High", status:"Open", dept:"Security + Warden", time:"6h ago" },
  { id:"C-1035", room:"208", student:"Kabir Singh", title:"Washroom light flickering, possible short circuit", category:"Electrical", urgency:"High", status:"In Progress", dept:"Maintenance", time:"8h ago" },
];

const VISITOR_LOG = [
  { id:"V-441", name:"Sunita Mehta", relation:"Mother", student:"Aarav Mehta · 203", status:"Checked In", time:"10:14 AM" },
  { id:"V-440", name:"Deepak Rao", relation:"Friend", student:"Rohan Das · 112", status:"Checked Out", time:"09:02 AM" },
  { id:"V-439", name:"Courier - Zomato", relation:"Delivery", student:"Priya Nair · 305", status:"Checked Out", time:"08:40 AM" },
];

const AI_QA = [
  { q:["mess timing","mess time","food time","breakfast","lunch","dinner"], a:"Mess timings: Breakfast 7:30–9:30 AM, Lunch 12:30–2:30 PM, Dinner 7:30–9:30 PM. Sunday brunch runs till 10:30 AM." },
  { q:["fee","fees","due","payment","pay"], a:"Your hostel fee for this term (₹48,000) is due on 30th June. ₹30,000 has been paid — ₹18,000 is pending. You can pay via the Fee Status card on your dashboard." },
  { q:["leave","outpass","weekend"], a:"To apply for leave, go to Leave Requests → New Request. Approvals from your warden usually take 2–4 hours on weekdays. Make sure to mention your destination and emergency contact." },
  { q:["visitor","guest"], a:"You can pre-approve a visitor from the Visitor Approval section. Security will scan their QR pass at the gate — approved visits are valid for the date you specify." },
  { q:["wifi","wi-fi","internet","network"], a:"Hostel Wi-Fi SSID is 'SmartHostel-Net'. If you're facing connectivity issues in your room, raise a complaint under category 'Infrastructure' and it'll be auto-prioritized for the IT team." },
  { q:["rule","rules","curfew","timing"], a:"Gate closes at 10:30 PM on weekdays and 11:30 PM on weekends. Entry after curfew requires prior warden approval logged via the Leave module." },
  { q:["room change","transfer","roommate"], a:"You can request a room change from Room Change Requests. If it's due to a conflict, file a Roommate Conflict report first — our system uses that history to recommend a suitable room." },
];

/* ============================ AI HELPERS (mocked, deterministic) ============================ */

function categorizeComplaint(text){
  const t = text.toLowerCase();
  let category = "General / Facilities";
  let urgency = "Low";
  let dept = "Maintenance";
  let confidence = 82;

  if(/(fight|assault|harass|threat|fire|smoke|weapon)/.test(t)){
    category = "Safety / Disturbance"; urgency = "High"; dept = "Security + Warden"; confidence = 96;
  } else if(/(water|leak|tap|pipe|toilet|washroom|drain)/.test(t)){
    category = "Plumbing"; urgency = /(flood|overflow|burst)/.test(t) ? "High" : "Medium"; dept="Maintenance"; confidence=91;
  } else if(/(electric|fan|light|socket|short circuit|wire|spark)/.test(t)){
    category = "Electrical"; urgency = /(spark|short circuit|smoke)/.test(t) ? "High" : "Medium"; dept="Maintenance"; confidence=93;
  } else if(/(noise|loud|music|disturb|snor)/.test(t)){
    category = "Roommate Conflict"; urgency = "Medium"; dept="Warden"; confidence=88;
  } else if(/(clean|garbage|smell|dirty|hygiene|pest|cockroach|rat)/.test(t)){
    category = "Hygiene"; urgency = /(rat|pest|cockroach)/.test(t) ? "Medium" : "Low"; dept="Housekeeping"; confidence=89;
  } else if(/(wifi|wi-fi|internet|network|router)/.test(t)){
    category = "Infrastructure / IT"; urgency = "Low"; dept="IT Support"; confidence=85;
  } else if(/(mess|food|meal)/.test(t)){
    category = "Mess / Food"; urgency = "Low"; dept="Mess Committee"; confidence=80;
  }
  return { category, urgency, dept, confidence };
}

function aiAssistantReply(text){
  const t = text.toLowerCase();
  for(const item of AI_QA){
    if(item.q.some(k=>t.includes(k))) return item.a;
  }
  return "I'm not fully sure about that yet — I've logged this question for the warden's team to add to my knowledge base. In the meantime, you can check the relevant portal section, or raise a complaint if it's something that needs action.";
}

function heatLevel(count){
  if(count >= 3) return "red";
  if(count >= 1) return "yellow";
  return "green";
}

/* ============================ SHARED UI ============================ */

function Toasts({toasts}){
  return (
    <div className="toast-wrap">
      {toasts.map(t=>(
        <div className="toast" key={t.id}>
          <span className="ttag" style={{background:t.color || "var(--rose)"}}></span>
          <span>{t.msg}</span>
        </div>
      ))}
    </div>
  );
}

function Pill({type, children}){
  return <span className={`pill pill-${type}`}>{children}</span>;
}

function urgencyPillType(u){
  return u === "High" ? "high" : u === "Medium" ? "medium" : "low";
}
function statusPillType(s){
  if(s==="Open") return "open";
  if(s==="In Progress") return "progress";
  if(s==="Resolved") return "resolved";
  if(s==="Acknowledged") return "ack";
  return "open";
}

/* ============================ HEATMAP ============================ */

function HeatMap({issues, onCellClick, selectable}){
  return (
    <div>
      <div className="heatmap-grid">
        {ROOMS.map(r=>{
          const count = issues[r.id] ?? 0;
          const level = heatLevel(count);
          return (
            <div
              key={r.id}
              className={`heat-cell heat-${level}`}
              title={`Room ${r.id} — ${count} active issue(s)`}
              onClick={()=> onCellClick && onCellClick(r.id, count)}
              style={{cursor: selectable ? "pointer":"default"}}
            >
              {r.id}
            </div>
          );
        })}
      </div>
      <div className="legend">
        <span><span className="dot" style={{background:"var(--teal)"}}></span> Healthy (0 issues)</span>
        <span><span className="dot" style={{background:"var(--amber)"}}></span> Moderate (1–2 issues)</span>
        <span><span className="dot" style={{background:"var(--rose)"}}></span> High density (3+ issues)</span>
      </div>
    </div>
  );
}

/* ============================ LOGIN ============================ */

const ROLES = [
  { id:"student", title:"Student", sub:"Aarav Mehta · Room 203", icon:"🎓" },
  { id:"parent", title:"Parent", sub:"Track your ward's wellbeing", icon:"👪" },
  { id:"warden", title:"Warden", sub:"Block C · Operations", icon:"🛎️" },
  { id:"security", title:"Security", sub:"Main Gate · Shift 2", icon:"🛡️" },
  { id:"admin", title:"Admin", sub:"Hostel Management", icon:"📊" },
];

function Login({onLogin}){
  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-visual">
          <div>
            <div className="brand-mark">SH</div>
            <h2 style={{marginTop:18, fontSize:26, fontWeight:800, lineHeight:1.25}}>SmartHostel AI</h2>
            <p style={{marginTop:10, fontSize:13.5, color:"#cdeae5", maxWidth:280}}>
              One platform for hostel operations, safety, and student wellbeing — built for students, wardens, parents, and security teams.
            </p>
          </div>
          <div style={{fontSize:11.5, color:"#9fd8d0", letterSpacing:1}}>
            v1.0 · PROTOTYPE BUILD
          </div>
        </div>
        <div className="login-form">
          <div className="eyebrow" style={{color:"var(--muted)", fontSize:11, letterSpacing:2, textTransform:"uppercase", fontWeight:700}}>Sign in as</div>
          <h2 style={{fontSize:22, fontWeight:800, marginTop:6}}>Choose your role</h2>
          <p style={{fontSize:12.5, color:"var(--muted)", marginTop:6}}>This is a demo build — select any role to explore that portal. No password required.</p>
          <div className="role-grid">
            {ROLES.map(r=>(
              <button className="role-btn" key={r.id} onClick={()=>onLogin(r.id)}>
                <div style={{fontSize:20, marginBottom:6}}>{r.icon}</div>
                <div className="r-title">{r.title}</div>
                <div className="r-sub">{r.sub}</div>
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================ SOS MODAL ============================ */

function SOSModal({onClose, onConfirm}){
  return (
    <div className="modal-bg">
      <div className="modal">
        <div className="icon-ring">🚨</div>
        <h2 style={{fontSize:19, fontWeight:800}}>Trigger Emergency SOS?</h2>

    if(!text.trim()) return;

      setSubmitting(false);
    }, 700);

          <button className="btn btn-primary" onClick={runAI} disabled={!text.trim() || submitting}>

function AIAssistant(){
  const [messages, setMessages] = useState([
    { from:"bot", text:"Hi Aarav 👋 I'm your Hostel AI Assistant. Ask me about fees, mess timings, leave, visitors, room rules, or anything hostel-related." }
  ]);
  const [input, setInput] = useState("");
  const scrollRef = useRef(null);

  useEffect(()=>{ if(scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [messages]);

  function send(text){
    if(!text.trim()) return;
    const userMsg = {from:"user", text};
    setMessages(m=>[...m, userMsg]);
    setInput("");
    setTimeout(()=>{
      setMessages(m=>[...m, {from:"bot", text: aiAssistantReply(text)}]);
    }, 500);
  }

  const suggestions = ["What time is dinner?", "How much fee do I owe?", "How do I apply for leave?", "What's the curfew time?"];

  return (
    <div>
      <div className="topbar"><div><div className="eyebrow">Student Portal</div><h1>AI Hostel Assistant</h1></div></div>
      <div className="card" style={{maxWidth:760}}>
        <div className="chat-window" ref={scrollRef}>
          {messages.map((m,i)=>(
            <div className={`msg ${m.from==="bot"?"msg-bot":"msg-user"}`} key={i}>{m.text}</div>
          ))}
        </div>
        <div style={{display:"flex", gap:8, flexWrap:"wrap", marginTop:12}}>
          {suggestions.map(s=>(
            <span className="suggestion" key={s} onClick={()=>send(s)}>{s}</span>
          ))}
        </div>
        <div className="chat-input-row">
          <input placeholder="Type your question…" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter") send(input);}} />
          <button className="btn btn-primary" onClick={()=>send(input)}>Send</button>
        </div>
      </div>
    </div>
  );
}

function WardenPortal({state, setState, addToast}){
  const [tab, setTab] = useState("dashboard");
  const navItems = [
    {id:"dashboard", icon:"🏠", label:"Dashboard"},
    {id:"complaints", icon:"📋", label:"Complaints"},
    {id:"emergency", icon:"🚨", label:"Emergency Dashboard"},
    {id:"roomchange", icon:"🔁", label:"Room Change Approvals"},
    {id:"leave", icon:"📅", label:"Leave Approvals"},
    {id:"analytics", icon:"📈", label:"Analytics"},
  ];

  function ackSOS(id){
    setState(s=>({...s, sosAlerts: s.sosAlerts.map(a=> a.id===id ? {...a, status:"Acknowledged"} : a)}));
    addToast("SOS acknowledged — response team dispatched", "var(--teal-deep)");
  }
  function resolveSOS(id){
    setState(s=>({...s, sosAlerts: s.sosAlerts.map(a=> a.id===id ? {...a, status:"Resolved"} : a)}));
    addToast("SOS marked resolved & logged as incident", "var(--teal-deep)");
  }
  function updateComplaintStatus(id, status){
    setState(s=>({...s, complaints: s.complaints.map(c=> c.id===id ? {...c, status} : c)}));
    addToast(`${id} marked as ${status}`, "var(--indigo)");
  }
  function decideRoomChange(id, decision){
    setState(s=>({...s, roomTransfers: s.roomTransfers.map(r=> r.id===id ? {...r, status:decision} : r)}));
    addToast(`Room change ${id} ${decision.toLowerCase()}`, "var(--indigo)");
  }
  function decideLeave(idx, decision){
    setState(s=>({...s, leaveRequests: s.leaveRequests.map((l,i)=> i===idx ? {...l, status:decision} : l)}));
    addToast(`Leave request ${decision.toLowerCase()}`, "var(--indigo)");

function SecurityEntry({state, setState, addToast}){

function SecurityQR({addToast}){
  const [code, setCode] = useState("");
  const [result, setResult] = useState(null);

  function validate(){
    if(!code.trim()) return;
    // mock: codes starting with "VA" are valid
    const valid = code.toUpperCase().startsWith("VA") || code.toUpperCase().startsWith("V-");
    setResult({valid, code});
    if(valid) addToast(`✅ Pass ${code} verified — entry logged`, "var(--teal-deep)");
    else addToast(`❌ Pass ${code} invalid or expired`, "var(--rose)");
  }

  return (
    <div>
      <div className="topbar"><div><div className="eyebrow">Security Portal</div><h1>QR Pass Validation</h1></div></div>
      <div className="grid grid-2">
        <div className="card" style={{textAlign:"center"}}>
          <h3>Scan / Enter Pass Code</h3>
          <div className="qr-box">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
              <rect width="100" height="100" fill="#fff"/>
              {Array.from({length:64}).map((_,i)=>{
                const x = (i%8)*12.5, y = Math.floor(i/8)*12.5;
                const on = (i*13)%7 < 3;
                return on ? <rect key={i} x={x} y={y} width="12.5" height="12.5" fill="#10151f"/> : null;
              })}
            </svg>
          </div>
          <div className="field" style={{marginTop:18}}>
            <label>Pass Code</label>
            <input placeholder="e.g. VA-441" value={code} onChange={e=>setCode(e.target.value)} />
          </div>
          <button className="btn btn-primary" onClick={validate}>Validate Pass</button>
          {result && (
            <div className="ai-result" style={{textAlign:"left", marginTop:16}}>
              {result.valid ? `✅ Pass ${result.code} is valid. Visitor approved for today's entry.` : `❌ Pass ${result.code} could not be verified. Please check ID manually.`}
            </div>
          )}
        </div>
        <div className="card">
          <h3>AI Visitor Risk Analysis</h3>
          <p style={{fontSize:13, lineHeight:1.7, color:"var(--muted)"}}>The system flags unusual visitor patterns — e.g. the same visitor checking in across multiple students' rooms, or repeated late-night entries.</p>
          <div className="list-row">
            <div style={{fontSize:13}}>🟡 "Deepak Rao" has visited 3 different rooms this month — flagged for review.</div>
            <Pill type="medium">Medium Risk</Pill>
          </div>
          <div className="list-row">
            <div style={{fontSize:13}}>🟢 "Sunita Mehta" — regular registered guardian, low risk.</div>
            <Pill type="low">Low Risk</Pill>
          </div>
        </div>
      </div>
    </div>
  );
}

function SecurityIncidents({state, setState, addToast}){
  const [title, setTitle] = useState("");

  function submit(){
    setState(s=>({...s, incidents:[{id:`INC-${Math.floor(100+Math.random()*900)}`, title, severity, status:"Reported", time:"Just now"}, ...s.incidents]}));

  return (
    <div>

          <button className="btn btn-primary" disabled={!title.trim()} onClick={submit}>Log Incident</button>

            <div className="list-row" key={inc.id}>
              <div>
                <div style={{fontWeight:700, fontSize:13.5}}>{inc.title}</div>
                <div style={{fontSize:11.5, color:"var(--muted)", marginTop:3}}>{inc.id} · {inc.time}</div>
              </div>
              <Pill type={inc.severity==="Critical"||inc.severity==="High" ? "high" : inc.severity==="Medium"?"medium":"low"}>{inc.severity}</Pill>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

                <div className="ai-head"><span className="ai-dot"></span> Fee Risk Prediction</div>
                <p style={{fontSize:13, lineHeight:1.7}}>14 students have pending electricity dues past the grace period. Sending automated reminders now is projected to recover ~₹2.1L before the term-end deadline.</p>
              </div>
            </div>
          </div>
        </div>
      )}

      {tab==="reports" && (
        <div>
          <div className="topbar"><div><div className="eyebrow">Admin Portal</div><h1>Reports</h1></div></div>
          <div className="card">
            <h3>Generate Report</h3>
            <div className="grid grid-3">
              {["Monthly Occupancy Report","Complaint Resolution Report","Fee Collection Report","Incident & Safety Report","Visitor Activity Report","Mess Feedback Summary"].map(r=>(
                <div className="card" key={r} style={{padding:16}}>
                  <div style={{fontWeight:700, fontSize:13.5, marginBottom:10}}>{r}</div>
                  <button className="btn btn-ghost" onClick={()=>addToast(`${r} generated (demo)`, "var(--indigo)")}>Generate PDF</button>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </Shell>
  );
}

/* ============================ SHELL / LAYOUT ============================ */

const ROLE_META = {
  student: {name:"Student Portal", mark:"SH"},
  parent: {name:"Parent Portal", mark:"SH"},
  warden: {name:"Warden Portal", mark:"SH"},
  security: {name:"Security Portal", mark:"SH"},
  admin: {name:"Admin Portal", mark:"SH"},
};

function Shell({role, tab, setTab, navItems, children, userLabel, userSub, avatarColor, initials, onLogout}){
  return (
    <div className="shell">
      <div className="sidebar">
        <div className="brand">
          <div className="brand-mark">SH</div>
          <div>
            <div className="brand-name">SmartHostel AI</div>
            <div className="brand-sub">{ROLE_META[role].name}</div>
          </div>
        </div>
        {navItems.map(n=>(
          <div className={`nav-item ${tab===n.id?"active":""}`} key={n.id} onClick={()=>setTab(n.id)}>
            <span className="nav-icon">{n.icon}</span>{n.label}
          </div>
        ))}
        <div className="sidebar-footer">
          <div className="user-pill">
            <div className="avatar" style={{background:avatarColor}}>{initials}</div>
            <div>
              <div style={{fontWeight:700, color:"#fff"}}>{userLabel}</div>
              <div style={{fontSize:11}}>{userSub}</div>
            </div>
          </div>
          <a className="logout" onClick={onLogout}>← Switch role / Logout</a>
        </div>
      </div>
      <div className="main">{children}</div>
    </div>
  );
}

/* ============================ ROOT APP ============================ */

function App(){
  const [role, setRole] = useState(null);
  const [toasts, setToasts] = useState([]);
  const [state, setState] = useState({
    complaints: INITIAL_COMPLAINTS,
    issues: seedIssues,
    sosAlerts: [],
    roomTransfers: [],
    leaveRequests: [],
    visitorApprovals: [],
    visitorLog: VISITOR_LOG,
    incidents: [
      { id:"INC-301", title:"Loud altercation reported in Block C corridor, 4th floor", severity:"High", status:"Reported", time:"6h ago" }
    ],
  });

  function addToast(msg, color){
    const id = Date.now() + Math.random();
    setToasts(t=>[...t, {id, msg, color}]);
    setTimeout(()=> setToasts(t=>t.filter(x=>x.id!==id)), 4000);
  }

  function handleLogout(){
    setRole(null);
  }

  // attach logout via context-ish prop drilling: wrap setRole
  const portals = {
    student: <StudentPortal state={state} setState={setState} addToast={addToast} />,
    parent: <ParentPortal state={state} addToast={addToast} />,
    warden: <WardenPortal state={state} setState={setState} addToast={addToast} />,
    security: <SecurityPortal state={state} setState={setState} addToast={addToast} />,
    admin: <AdminPortal state={state} addToast={addToast} />,
  };

  if(!role) return <Login onLogin={setRole} />;

  return (
    <React.Fragment>
      <Toasts toasts={toasts} />
      <LogoutInjector onLogout={handleLogout}>
        {portals[role]}
      </LogoutInjector>
    </React.Fragment>
  );
}

// Helper to inject onLogout into the Shell via cloning the tree's nav-item area —
// simplified: we just render a floating switch-role button instead.
function LogoutInjector({children, onLogout}){
  return (
    <div style={{position:"relative"}}>
      {children}
      <button
        onClick={onLogout}
        style={{
          position:"fixed", bottom:18, left:18, zIndex:40,
          background:"#10151f", color:"#fff", border:"none", borderRadius:10,
          padding:"9px 16px", fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"inherit",
          boxShadow:"0 8px 20px rgba(0,0,0,0.25)"
        }}
      >← Switch Role</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
